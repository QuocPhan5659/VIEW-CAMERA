    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              banana: {
                100: '#FDF7E3',
                200: '#F9EBB2',
                300: '#F1D97E',
                400: '#E7C34B',
                500: '#D4AC0D', // Muted yellow (Sunflower/Gold)
                600: '#B7950B',
                700: '#9A7D0A',
                800: '#7D6608',
                900: '#5F4D06',
              },
              dark: {
                800: '#1a1a1a',
                900: '#0a0a0a', // Even darker
              },
              brown: {
                800: '#4E342E',
                900: '#3E2723',
              }
            },
            animation: {
              'bounce-slow': 'bounce 3s infinite',
              'wiggle': 'wiggle 1s ease-in-out infinite',
            },
            keyframes: {
              wiggle: {
                '0%, 100%': { transform: 'rotate(-3deg)' },
                '50%': { transform: 'rotate(3deg)' },
              }
            }
          }
        }
      }
